fr:
  admin:
    comparaison:
      download_pdf:
        erreur_generation_pdf: Erreur durant la généraiton du PDF. Veuillez rééssayer
      errors:
        limite_evaluations: "Vous ne pouvez pas comparer plus de 2 évaluations pour la compétence Numératie et plus de 2 évaluations pour la compétence Littératie"
      litteratie:
        profils:
          identique: "maintient un niveau général identique : %{profil}."
        textes_profils:
          profil1: "rencontre de très fortes difficultés pour communiquer en français à l’écrit et est réputée en situation d’illettrisme (degré 1). Elle évite généralement de lire et d’écrire, même si elle peut lire et écrire quelques mots très courants ou familiers (nom, prénom, adresse, etc.). La personne, quand elle arrive à déchiffrer un écrit n’est pas toujours en mesure de comprendre le contenu de ce qu’elle lit. L’écrit produit est difficilement compréhensible."
          profil2: "rencontre de fortes difficultés pour communiquer en français à l’écrit et est réputée en situation d’illettrisme (degré 2). Elle évite d’écrire mais quand elle le fait, l’écrit produit est souvent phonétique et / ou n’est pas compréhensible hors contexte. Elle peut, dans un contexte familier, lire des phrases simples, trouver des informations dans des documents courants et identifier leur fonction."
          profil3: "rencontre quelques difficultés pour communiquer en français à l’écrit et est réputée sortie de l’illettrisme (degré 3). La personne peut lire et souvent accéder au sens de ce qu’elle lit. Elle peut écrire des textes courts compréhensibles, et s’approprie progressivement les codes (règles orthographiques, registres de langue)."
          profil4: "maîtrise les bases de la communication en français à l’écrit et n’est pas en situation d’illettrisme (degré 4). Elle lit et comprend ce qu’elle lit. Elle produit de l’écrit lisible, structuré, porteur de sens mais qui peut présenter des erreurs de grammaire et d’orthographe. Elle a acquis un bagage équivalent au niveau du CFG (certificat de formation générale)."
          profil4_plus: "possède une bonne maîtrise de la lecture et de l’écriture en français. Elle produit des textes structurés qui respectent les normes de l’écrit (utilisation des règles orthographiques grammaticales, connecteurs, concordance des temps, etc.). Elle lit sans difficulté et comprend ce qu’elle lit, synthétise les informations essentielles et peut en faire une analyse critique. Elle a acquis un bagage équivalent aux exigences du DNB (diplôme national du brevet)."
          profil4_plus_plus: "maîtrise la lecture et la communication en français à l’écrit. Elle produit des textes structurés qui respectent les normes de l’écrit (utilisation des règles orthographiques grammaticales, connecteurs, concordance des temps, etc.). Elle lit sans difficulté et comprend ce qu’elle lit, synthétise les informations essentielles et peut en faire une analyse critique. Elle a acquis un bagage équivalent aux exigences du CAP ou BEP."
          indetermine: "n’a pas de profil déterminé en littératie."
          profil_aberrant: "n'a pas pu être positionnée correctement et aucun profil n'a pu lui être attribué. Les raisons peuvent être les suivantes : un abandon de la passation, un problème technique qui a empêché l'enregistrement des données, un effet de seuil lié à l'algorithme d'EVA. Une nouvelle passation de ce parcours est recommandée."
      numeratie:
        profils:
          identique: "maintient un niveau général identique : %{profil}."
        textes_profils:
          profil1: "rencontre de très fortes difficultés pour calculer et raisonner. Elle est réputée en situation d’innumérisme (degré 1). Elle se repère difficilement dans l’univers des nombres (base de la numération) et / ou dans l’espace et le temps. Elle n’est pas à l’aise pour réaliser des calculs simples."
          profil2: "rencontre de fortes difficultés pour calculer et raisonner. Elle est réputée en situation d’innumérisme (degré 2). Elle évite d’utiliser les nombres mais peut, dans un environnement familier, résoudre des problèmes qui nécessitent des calculs simples, des estimations ou du classement de nombres."
          profil3: "rencontre quelques difficultés pour calculer et raisonner. Elle est réputée sortie de l’innumérisme (degré 3). Elle est capable de lire et d’écrire de grands nombres, de se repérer dans l’univers des nombres décimaux, de lire l’heure, un planning ou un histogramme. Elle peut réaliser des multiplications et des divisions et résoudre des problèmes qui ne sont pas trop complexes."
          profil4: "maîtrise les bases de la numératie. Elle n’est pas en situation d’innumérisme (degré 4). Elle est à l’aise dans l’univers des nombres et peut résoudre des problèmes relativement complexes, dont des problèmes de géométrie. Elle comprend et utilise des pourcentages ou la proportionnalité. Elle connait et peut manipuler les unités de temps et de mesure usuelles, les tableaux croisés et les plans ou schémas. Elle a acquis un bagage équivalent au niveau du CFG (certificat de formation générale)."
          profil4_plus: "possède une bonne maîtrise de la numératie. Elle est à l’aise dans l’univers des nombres et peut résoudre des problèmes complexes qui mettent en jeu plusieurs opérations mathématiques, dont des problèmes de géométrie. Elle utilise facilement les plannings, les graphiques, les plans, etc. et peut réaliser des conversions, manipuler les pourcentages et la proportionnalité. Elle peut envisager une certification CléA de ses compétences."
          indetermine: "n’a pas de profil déterminé en numératie."
          profil_aberrant: "n'a pas pu être positionnée correctement et aucun profil n'a pu lui être attribué. Les raisons peuvent être les suivantes : un abandon de la passation, un problème technique qui a empêché l'enregistrement des données, un effet de seuil lié à l'algorithme d'EVA. Une nouvelle passation de ce parcours est recommandée."
